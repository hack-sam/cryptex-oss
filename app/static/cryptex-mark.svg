<svg
  xmlns="http://www.w3.org/2000/svg"
  width="96"
  height="96"
  viewBox="0 0 96 96"
  fill="none"
  role="img"
  aria-label="Cryptex"
>
  <!--
    Cryptex brand mark — keyhead diamond + cipher-disc circle + notched
    shaft. Sized at 96×96 for use in transactional email banners.
    Hardcoded brand palette (no CSS vars — emails render outside any
    document context):
      primary  #f97316  orange
      accent   #6b8294  steel blue
      bg       #1a1410  charcoal (rounded square + cipher-disc center)
  -->
  <defs>
    <linearGradient id="cx-grad" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f97316" />
      <stop offset="1" stop-color="#6b8294" />
    </linearGradient>
  </defs>
  <rect width="96" height="96" rx="20" fill="#1a1410" />
  <!-- Path scaled 3x from the 32×32 favicon: each path coord ×3 -->
  <path
    d="M33 12 L66 12 L81 27 L81 45 L66 60 L54 60 L54 72 L63 72 L63 81 L54 81 L54 90 L45 90 L45 60 L33 60 L18 45 L18 27 Z"
    fill="url(#cx-grad)"
  />
  <circle cx="49.5" cy="36" r="7.8" fill="#1a1410" />
</svg>
