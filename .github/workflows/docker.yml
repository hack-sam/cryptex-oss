name: Docker build

on:
  push:
    branches: [main, master]
    tags: ['v*.*.*']
    paths:
      - 'Dockerfile'
      - 'nginx.conf'
      - 'docker-compose.yml'
      - '.dockerignore'
      - 'app/**'
      - 'src/transformers/**'
      - '.github/workflows/docker.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'nginx.conf'
      - 'app/**'
      - 'src/transformers/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/m4xx101/cryptex-oss
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build & push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build single-arch image for local smoke test
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: cryptex:ci
          cache-from: type=gha

      - name: Smoke-test the container
        run: |
          # Start, wait for health, probe the routes, stop.
          docker run -d --name cryptex-ci -p 8080:80 cryptex:ci
          for i in {1..30}; do
            if curl -sf http://localhost:8080/health >/dev/null 2>&1; then
              echo "Health check passed"
              break
            fi
            sleep 1
          done
          echo "--- routes ---"
          curl -s -o /dev/null -w "%{http_code}  /\n"             http://localhost:8080/
          curl -s -o /dev/null -w "%{http_code}  /transforms/\n"  http://localhost:8080/transforms/
          curl -s -o /dev/null -w "%{http_code}  /decode/\n"      http://localhost:8080/decode/
          curl -s -o /dev/null -w "%{http_code}  /emoji/\n"       http://localhost:8080/emoji/
          curl -s -o /dev/null -w "%{http_code}  /settings/\n"    http://localhost:8080/settings/
          docker logs cryptex-ci | tail -20
          docker stop cryptex-ci && docker rm cryptex-ci
